spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: NON_NULL
  datasource:
    url: ${DATABASE_JDBC_URL:jdbc:postgresql://localhost:5432/aractakip}
    username: ${DATABASE_POOLER_USER:aractakip}
    password: ${DATABASE_PASSWORD:aractakip}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:5rfkltamDTXZ3kgGfF7E3qfcnGPlUUQC2//ngHiS4Vk=}
  expiration-ms: 86400000  # 24 saat

server:
  port: 8080

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
